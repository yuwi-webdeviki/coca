<section class="gs">
  <div class="container gs__container">
    <div class="gs__form-wrapper">
      <h3 class="gs__form-title heading-h4">Let’s level up your brand</h3>
      <p class="gs__form-text text-p-medium">
        You can reach us anytime
        <a href="mailto:hellosansbrothers@gmail.com" class="gs__form-link">
          hellosansbrothers@gmail.com
        </a>
      </p>
      <form class="gs__form">
        <div class="gs__form-top">
          <label class="gs__form-label text-p-small">
            <span class="gs__form-label-text">First name</span>
            <input
              type="text"
              class="gs__form-input gs__form-input--small text-p-small"
              name="first-name"
              required
              placeholder="First name"
            />
          </label>
          <label class="gs__form-label text-p-small">
            <span class="gs__form-label-text">Last name</span>
            <input
              type="text"
              class="gs__form-input gs__form-input--small text-p-small"
              name="last-name"
              required
              placeholder="Last name"
            />
          </label>
        </div>
        <label class="gs__form-label text-p-small">
          <span class="gs__form-label-text">Email</span>
          <input
            type="email"
            class="gs__form-input text-p-small"
            name="email"
            required
            placeholder="you@company.com"
          />
        </label>
        <label class="gs__form-label text-p-small">
          <span class="gs__form-label-text">Phone number</span>
          <input
            data-phone-input
            type="tel"
            class="gs__form-input text-p-small"
            name="phone"
            required
            placeholder="+1 (555) 000-0000"
          />
        </label>
        <label class="gs__form-label text-p-small">
          <span class="gs__form-label-text">Message</span>
          <textarea
            type="text"
            class="gs__form-input gs__form-input--textarea text-p-small"
            name="message"
            required
            placeholder="Leave us a message..."
          ></textarea>
        </label>
        <button class="gs__form-btn button-form">Get Started</button>
      </form>
    </div>
    <img
      class="gs__img"
      src="./assets/images/get-started-img.jpg"
      width="987"
      height="885"
      loading="lazy"
      alt="A woman and a man high five"
    />
  </div>
</section>
